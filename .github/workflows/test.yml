# test.yml
# GitHub Actions workflow 파일
# 
# 언제 실행되나?
# main(나는 master) 브랜치에 push 하거나 PR을 올릴 때 자동으로 실행됨
#
# 뭘 하나?
# GitHub 서버에서 가상 환경을 만들고
# 우리 테스트를 자동으로 실행해줌

name: Run Tests  # GitHub Actions 탭에 표시될 이름

on:              # 언제 실행할지
  push:
    branches: [ master ]   # master에 push할 때
  pull_request:
    branches: [ master ]   # master으로 PR 올릴 때

jobs:
  test:
    runs-on: ubuntu-latest  # GitHub 서버 OS (우분투 사용)

    steps:
      # 1. 코드 가져오기
      - name: 코드 체크아웃
        uses: actions/checkout@v3

      # 2. Python 설치
      - name: Python 설치
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3. 의존성 설치
      - name: 패키지 설치
        run: pip install -r requirements.txt

      # 4. Playwright 브라우저 설치
      - name: Playwright 브라우저 설치
        run: python -m playwright install --with-deps chromium

      # 5. Flask 서버 백그라운드 실행
      - name: Flask 서버 실행
        run: |
          cd app
          python server.py &
          sleep 2
        # & = 백그라운드 실행 (서버를 켜놓고 다음 단계로 넘어감)
        # sleep 2 = 서버가 완전히 뜰 때까지 2초 대기

      # 6. 단위 테스트 실행
      - name: 단위 테스트
        run: pytest tests/unit/ -v

      # 7. E2E 테스트 실행 (headless 모드 — 서버에는 화면이 없음)
      - name: E2E 테스트
        run: pytest tests/e2e/ -v

      # 8. 실패 시 스크린샷 업로드
      - name: 스크린샷 업로드 (실패 시)
        if: failure()   # 앞 단계가 실패했을 때만 실행
        uses: actions/upload-artifact@v3
        with:
          name: screenshots
          path: artifacts/screenshots/