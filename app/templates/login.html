<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #f4f4f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #fff;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
      width: 320px;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #18181b;
    }

    #error {
      background: #fef2f2;
      color: #ef4444;
      border: 1px solid #fecaca;
      border-radius: 8px;
      padding: 0.6rem 0.9rem;
      font-size: 0.85rem;
    }

    label {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      font-size: 0.85rem;
      font-weight: 500;
      color: #52525b;
    }

    br { display: none; }

    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    input {
      padding: 0.6rem 0.75rem;
      border: 1px solid #d4d4d8;
      border-radius: 8px;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }

    #login-btn {
      padding: 0.65rem;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    #login-btn:hover { background: #4f46e5; }
    #login-btn:active {
      background: #3730a3;
      transform: scale(0.98);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.4);
    }
    #login-btn:focus-visible {
      outline: 3px solid #6366f1;
      outline-offset: 3px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Login</h1>

    {% if error %}
      <p id="error">{{ error }}</p>
    {% endif %}

    <form method="post" action="/login">
      <label>
        Username:
        <input id="username" name="username" />
      </label>
      <br />
      <label>
        Password:
        <input id="password" name="password" type="password" />
      </label>
      <br />
      <button id="login-btn" type="submit">Login</button>
    </form>
  </div>
</body>
</html>
